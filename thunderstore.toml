[config]
schemaVersion = "0.1.0"


[package]
namespace = "JarlUlsfark"
name = "AspectYoungMel"
versionNumber = "1.0.7"
description = "Adds new Weapon Aspects for each of the six base weapons themed around Melinoë's youth."
websiteUrl = "https://github.com/Tal-lev/AspectYoungMel"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.105"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-Chalk = "2.1.1"
SGG_Modding-ReLoad = "1.0.2"
SGG_Modding-SJSON = "1.0.0"
SGG_Modding-ModUtil = "4.0.1"
zerp-AspectExtender = "0.0.1"
Siuhnexus-BountyAPI = "1.0.1"
NikkelM-Cosmetics_API = "1.1.4"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"


[[build.copy]]
source = "./data"
target = "./plugins_data"


[publish]
repository = "https://thunderstore.io"
communities = [ "hades-ii", ]

[publish.categories]
hades-ii = [ "mods", ]
